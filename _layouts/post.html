---
layout: default
---
<article class="post">
  <header class="post-header">
    <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
    <h1 class="post-title">{{ page.title }}</h1>
  </header>
  {% if page.image %}<div class="post-image"><img src="{{ page.image | relative_url }}" alt=""></div>{% endif %}
  <div class="post-content">
    {{ content }}
  </div>
  <p class="post-back"><a href="{{ '/' | relative_url }}">← all posts</a></p>
</article>
